name: Package macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'frontend/VideoAnalysis.App/**'
      - 'backend/VideoAnalysis.Core/**'
      - 'backend/VideoAnalysis.Infrastructure/**'
      - 'scripts/macos/**'
      - 'tools/ffmpeg/**'
      - '.github/workflows/macos-package.yml'

jobs:
  package-macos-arm64:
    name: Build macOS arm64 bundle
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore app project
        run: dotnet restore frontend/VideoAnalysis.App/VideoAnalysis.App.csproj

      - name: Make packaging script executable
        run: chmod +x scripts/macos/package-app.sh

      - name: Package macOS app
        run: ./scripts/macos/package-app.sh

      - name: Verify packaging output
        run: |
          test -d dist/macos/VideoAnalysis.app
          test -f dist/macos/VideoAnalysis-macos-osx-arm64.zip

      - name: Upload macOS zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoAnalysis-macos-osx-arm64
          path: dist/macos/VideoAnalysis-macos-osx-arm64.zip
          if-no-files-found: error
          retention-days: 14
